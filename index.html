<!DOCTYPE html>
<html lang="id" class="dark-mode">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISA_AI_SUPREME</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#050505">
    <link rel="icon" href="https://via.placeholder.com/45?text=ARISA" type="image/png">
</head>
<body>
    <!-- Background Sederhana -->
    <div class="neon-bg"></div>

    <!-- Sidebar Ringan -->
    <div id="sidebar" class="sidebar-hidden">
        <div class="sidebar-header">
            <h3>Menu Utama</h3>
            <button onclick="toggleSidebar()" class="close-sidebar">✕</button>
        </div>
        <div class="user-profile">
            <img src="https://via.placeholder.com/50?text=USER" alt="User" class="user-avatar">
            <div class="user-details">
                <h4 id="user-name">TUAN_WAHYU</h4>
                <small>RANK: CYBER_MASTER</small>
            </div>
        </div>
        <div class="sidebar-menu">
            <button onclick="quickCmd('Menu Fitur')" class="sidebar-btn">📋 Menu Fitur</button>
            <button onclick="openSettings()" class="sidebar-btn">⚙️ Pengaturan</button>
            <button onclick="viewChatHistory()" class="sidebar-btn">📜 Riwayat Chat</button>
        </div>
    </div>

    <!-- Main Container Ringan -->
    <div class="app-container">
        <header>
            <button onclick="toggleSidebar()" class="menu-btn">☰</button>
            <div class="ai-info">
                <div class="avatar-wrapper">
                    <img id="ai-avatar" src="https://via.placeholder.com/45?text=ARISA" alt="ARISA AI" onerror="this.src='https://via.placeholder.com/45?text=AI';">
                    <div class="status-dot pulse"></div>
                </div>
                <div>
                    <h2 id="ai-display-name">ARISA_AI_SUPREME</h2>
                    <small id="clock">00:00:00</small>
                </div>
            </div>
            <div class="header-btns">
                <button onclick="toggleVoice()" id="voice-btn">🔊</button>
                <button onclick="hapusChat()">🗑️</button>
            </div>
        </header>

        <div id="chat-box">
            <div class="msg bot">
                Selamat datang, Tuan Wahyu ✨. Ada yang bisa saya bantu? 🌸
            </div>
        </div>

        <div id="loader" class="hidden">
            Sabar dulu Tuan... ✨
        </div>

        <div class="quick-btns">
            <button onclick="quickCmd('Menu Fitur')" class="quick-btn">📋 Menu</button>
            <button onclick="quickCmd('Cari Music ID')" class="quick-btn">🎵 Music ID</button>
            <button onclick="quickCmd('Buat Logo')" class="quick-btn">🎨 Logo</button>
            <button onclick="quickCmd('Buat Website Portofolio')" class="quick-btn">🌐 Web</button>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ketik perintah..." autocomplete="off">
            <button id="send-btn">KIRIM</button>
        </div>
    </div>

    <!-- Settings Popup Ringan -->
    <div id="settings-modal" class="hidden">
        <div class="modal-overlay" onclick="closeSettings()"></div>
        <div class="modal-content">
            <h3>⚙️ Pengaturan</h3>
            <button class="close-modal" onclick="closeSettings()">✕</button>
            
            <div class="setting-section">
                <h4>SUARA AI</h4>
                <button onclick="changeVoice('female')" class="setting-btn">👩 Cewek Lembut</button>
                <button onclick="changeVoice('male')" class="setting-btn">👨 Cowok Modern</button>
            </div>
            
            <div class="setting-section">
                <h4>TEMA</h4>
                <button onclick="changeTheme('blue')" class="setting-btn">🔵 Neon Biru</button>
                <button onclick="changeTheme('purple')" class="setting-btn">🟣 Neon Ungu</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
